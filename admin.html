<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scalecale=1.0">
<title>日记管理</title>
<style>
body{background:#f5f7fa;padding:20px;font-family:Arial,sans-serif;}
.box{max-width:700px;margin:0 auto;background:#fff;padding:25px;border-radius:12px;}
input,textarea,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px;font-size:16px;}
button{background:#2b85e4;color:#fff;border:none;cursor:pointer;}
.del{background:#ee5555;}
.logout{background:#666;}
</style>
</head>
<body>

<div class="box">

    <!-- 登录区域（登录后自动隐藏） -->
    <div id="loginBox">
        <h2>管理员登录</h2>
        <input type="password" id="pwd" placeholder="输入密码">
        <button onclick="login()">登录</button>
    </div>

    <!-- 退出按钮（默认隐藏，登录后显示） -->
    <button class="logout" onclick="logout()" style="display:none;" id="logoutBtn">退出登录</button>

    <!-- 管理面板（默认隐藏） -->
    <div id="adminPanel" style="display:none;">
        <h3>写新日记</h3>
        <input type="text" id="dDate" placeholder="例如：2026年5月15日">
        <textarea id="dContent" rows="6" placeholder="写下日记内容"></textarea>
        <button onclick="saveDiary()">保存日记</button>
        <h3>已有日记</h3>
        <div id="list"></div>
    </div>

</div>

<script>
const PWD = "221229";

// 登录
function login(){
    let val = document.getElementById("pwd").value;
    if(val === PWD){
        // 隐藏登录框
        document.getElementById("loginBox").style.display = "none";
        // 显示退出按钮
        document.getElementById("logoutBtn").style.display = "block";
        // 显示管理面板
        document.getElementById("adminPanel").style.display = "block";
        
        let now = new Date();
        let y = now.getFullYear();
        let m = now.getMonth()+1;
        let d = now.getDate();
        document.getElementById("dDate").value = `${y}年${m}月${d}日`;
        renderList();
    }else{
        alert("密码错误");
    }
}

// 退出登录
function logout(){
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("adminPanel").style.display = "none";
}

// 获取日记列表
function getList(){
    return JSON.parse(localStorage.getItem("myDiary") || "[]");
}

// 保存列表
function saveList(arr){
    localStorage.setItem("myDiary",JSON.stringify(arr));
}

// 渲染日记
function renderList(){
    let arr = getList();
    arr.sort((a,b)=>b.time-a.time);
    let html = "";
    arr.forEach((v,i)=>{
        html += `
        <div style="padding:10px;border-bottom:1px solid #eee;">
            <div><b>${v.date}</b></div>
            <div>${v.content}</div>
            <button class="del" onclick="delDiary(${i})">删除</button>
        </div>
        `;
    });
    document.getElementById("list").innerHTML = html;
}

// 保存日记
function saveDiary(){
    let date = document.getElementById("dDate").value;
    let content = document.getElementById("dContent").value;
    if(!date || !content){
        alert("日期和内容不能为空");
        return;
    }
    let arr = getList();
    arr.unshift({
        date:date,
        content:content,
        time:new Date().getTime()
    });
    saveList(arr);
    alert("保存成功");
    document.getElementById("dContent").value = "";
    renderList();
}

// 删除日记
function delDiary(idx){
    if(!confirm("确定删除？")) return;
    let arr = getList();
    arr.splice(idx,1);
    saveList(arr);
    renderList();
}
</script>
</body>
</html>
