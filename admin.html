<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>日记后台</title>
<style>
body{background:#f5f7fa;padding:20px;font-family:system-ui}
.box{max-width:700px;margin:0 auto;background:#fff;border-radius:12px;padding:20px}
input,textarea,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px;font-size:16px}
button{background:#2b85e4;color:#fff;border:none}
.del{background:#ee5555}
#admin{display:none}
</style>
</head>
<body>
<div class="box">
<h2>管理员登录</h2>
<input type="password" id="pwd" placeholder="输入密码">
<button onclick="login()">登录</button>

<div id="admin">
<h3>写新日记</h3>
<input type="text" id="dDate" placeholder="日期">
<textarea id="dContent" rows="6" placeholder="日记内容"></textarea>
<button onclick="save()">保存日记</button>
<h3>已有日记</h3>
<div id="list"></div>
</div>
</div>

<script>
const PASS="221229";
const URL="https://jsonblob.com/api/jsonBlob/1159260576996478976";

async function login(){
  if(document.getElementById("pwd").value===PASS){
    document.getElementById("admin").style.display="block";
    let now=new Date();
    document.getElementById("dDate").value=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
    loadList();
  }else alert("密码错误");
}

async function getArr(){
  let res=await fetch(URL);
  return await res.json();
}

async function loadList(){
  let arr=await getArr();
  arr.sort((a,b)=>b.time-a.time);
  let html="";
  arr.forEach((v,i)=>{
    html+=`<div style="padding:12px 0;border-bottom:1px solid #eee">
      <div>${v.date}</div>
      <div style="margin:6px 0">${v.content}</div>
      <button class="del" onclick="del(${i})">删除</button>
    </div>`;
  });
  document.getElementById("list").innerHTML=html;
}

async function save(){
  let date=document.getElementById("dDate").value.trim();
  let content=document.getElementById("dContent").value.trim();
  if(!date||!content){alert("请填日期和内容");return}
  let arr=await getArr();
  arr.push({date,content,time:Date.now()});
  await fetch(URL,{method:"PUT",body:JSON.stringify(arr)});
  alert("保存成功！所有手机电脑同步");
  document.getElementById("dContent").value="";
  loadList();
}

async function del(idx){
  let arr=await getArr();
  arr.splice(idx,1);
  await fetch(URL,{method:"PUT",body:JSON.stringify(arr)});
  loadList();
}
</script>
</body>
</html>
