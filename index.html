<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的日记</title>
<style>
body{background:#f5f7fa;padding:20px;font-family:system-ui}
.box{max-width:700px;margin:0 auto;background:#fff;border-radius:12px;padding:20px}
.item{border-bottom:1px solid #eee;padding:15px 0}
.date{color:#777;font-size:14px}
.content{margin-top:8px;line-height:1.7}
</style>
</head>
<body>
<div class="box">
<h1>我的日记</h1>
<div id="list"></div>
</div>

<script>
async function getDiary(){
  let res=await fetch("https://jsonblob.com/api/jsonBlob/1159260576996478976");
  return await res.json();
}
async function show(){
  let arr=await getDiary();
  arr.sort((a,b)=>b.time-a.time);
  let html="";
  arr.forEach(v=>{
    html+=`<div class="item"><div class="date">${v.date}</div><div class="content">${v.content}</div></div>`;
  });
  document.getElementById("list").innerHTML=html;
}
show();
</script>
</body>
</html>
