<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的日记</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{background:#f0f4f8;padding:20px;}
        .container{max-width:700px;margin:0 auto;}
        h1{text-align:center;margin:30px 0;color:#222;}
        .note{background:#fff;border-radius:8px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
        .date{font-size:14px;color:#666;margin-bottom:8px;}
        .content{font-size:16px;line-height:1.6;color:#333;}
        .tip{text-align:center;margin-top:30px;color:#999;font-size:14px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>我的日记</h1>
        <div id="notesList"></div>
        <div class="tip">仅管理员可编辑日记</div>
    </div>

    <script>
        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem("myDiary") || "[]");
            const list = document.getElementById("notesList");
            list.innerHTML = "";
            notes.sort((a,b) => b.time - a.time);
            notes.forEach(note => {
                const div = document.createElement("div");
                div.className = "note";
                div.innerHTML = `
                    <div class="date">${note.date}</div>
                    <div class="content">${note.content}</div>
                `;
                list.appendChild(div);
            });
        }
        loadNotes();
    </script>
</body>
</html>
