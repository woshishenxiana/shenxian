<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>我的日记</title>
<style>
body{background:#f5f7fa;padding:20px;font-family:Arial,sans-serif;}
.box{max-width:700px;margin:0 auto;background:#fff;padding:20px;border-radius:12px;}
h1{text-align:center;}
.item{border-bottom:1px solid #eee;padding:15px 0;}
.date{color:#777;font-size:14px;}
.content{margin-top:8px;line-height:1.6;}
</style>
</head>
<body>
<div class="box">
<h1>我的日记</h1>
<div id="list"></div>
</div>
<script>
const apiUrl = "https://api.npoint.io/9f670134773867598765";
async function getDiary(){
  let res = await fetch(apiUrl);
  return await res.json() || [];
}
async function render(){
  let list = await getDiary();
  list.sort((a,b)=>b.time-a.time);
  let html = "";
  list.forEach(v=>{
    html += `<div class="item"><div class="date">${v.date}</div><div class="content">${v.content}</div></div>`;
  })
  document.getElementById("list").innerHTML = html;
}
render();
</script>
</body>
</html>
